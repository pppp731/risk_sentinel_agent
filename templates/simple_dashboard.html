<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风险哨兵 - IF椰子水舆情监控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .refresh-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-right: 15px;
        }

        .icon-blue { background: #e3f2fd; }
        .icon-red { background: #ffebee; }
        .icon-yellow { background: #fff3e0; }
        .icon-green { background: #e8f5e9; }

        .card-title {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 700;
            color: #333;
        }

        .risk-high { color: #e74c3c; }
        .risk-medium { color: #f39c12; }
        .risk-low { color: #27ae60; }

        .panel {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .panel-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .alert-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid;
            background: #f8f9fa;
        }

        .alert-critical {
            border-left-color: #e74c3c;
            background: #ffebee;
        }

        .alert-high {
            border-left-color: #f39c12;
            background: #fff3e0;
        }

        .alert-medium {
            border-left-color: #3498db;
            background: #e3f2fd;
        }

        .alert-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .alert-time {
            font-size: 0.85rem;
            color: #666;
        }

        .news-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.3s;
        }

        .news-item:hover {
            background: #f8f9fa;
        }

        .news-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .news-meta {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
        }

        .news-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-right: 8px;
        }

        .badge-positive {
            background: #d4edda;
            color: #155724;
        }

        .badge-negative {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-neutral {
            background: #e2e3e5;
            color: #383d41;
        }

        .badge-risk {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: white;
            opacity: 0.8;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 风险哨兵智能体</h1>
            <p>IF椰子水 舆情监控与风险分析系统</p>
            <button class="refresh-btn" onclick="refreshData()" id="refreshBtn">
                🔄 刷新数据
            </button>
        </header>

        <div id="dashboard">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载数据...</p>
            </div>
        </div>

        <footer>
            <p>© 2024 风险哨兵智能体 | 基于NLP的实时舆情监控系统</p>
        </footer>
    </div>

    <script>
        let charts = {};

        // 页面加载时自动获取数据
        window.onload = function() {
            refreshData();
        };

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 加载中...';

            try {
                const response = await fetch('/api/analyze');
                const result = await response.json();

                if (result.success) {
                    renderDashboard(result.data);
                } else {
                    showError(result.error);
                }
            } catch (error) {
                showError('获取数据失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 刷新数据';
            }
        }

        function renderDashboard(data) {
            const container = document.getElementById('dashboard');

            const riskClass = getRiskClass(data.overall_risk_level);
            const negativeRatio = calculateNegativeRatio(data.sentiment_distribution);

            container.innerHTML = `
                <!-- 关键指标卡片 -->
                <div class="dashboard">
                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon icon-blue">📊</div>
                            <div>
                                <div class="card-title">分析文章总数</div>
                                <div class="card-value">${data.total_articles}</div>
                            </div>
                        </div>
                        <div style="color: #666; font-size: 0.9rem; margin-top: 10px;">
                            发现 ${data.risky_articles} 条风险内容
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon icon-red">⚠️</div>
                            <div>
                                <div class="card-title">综合风险评分</div>
                                <div class="card-value ${riskClass}">${data.average_risk_score}</div>
                            </div>
                        </div>
                        <div style="color: #666; font-size: 0.9rem; margin-top: 10px;">
                            满分 100 分
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon icon-yellow">🔔</div>
                            <div>
                                <div class="card-title">风险等级</div>
                                <div class="card-value ${riskClass}">${data.overall_risk_level}</div>
                            </div>
                        </div>
                        <div style="color: #666; font-size: 0.9rem; margin-top: 10px;">
                            基于NLP分析
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <div class="card-icon icon-green">📈</div>
                            <div>
                                <div class="card-title">负面舆情占比</div>
                                <div class="card-value" style="color: ${negativeRatio > 40 ? '#e74c3c' : '#f39c12'}">${negativeRatio}%</div>
                            </div>
                        </div>
                        <div style="color: #666; font-size: 0.9rem; margin-top: 10px;">
                            情感分析统计
                        </div>
                    </div>
                </div>

                <!-- 预警和风险 -->
                <div class="grid-2">
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">⚠️ 风险预警</span>
                            <span style="color: #e74c3c; font-weight: 600;">${data.warnings.length} 条</span>
                        </div>
                        <div id="alertsList">
                            ${renderAlerts(data.warnings)}
                        </div>
                    </div>

                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">📊 风险类型分布</span>
                        </div>
                        <div class="chart-container">
                            <canvas id="riskChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- 图表区 -->
                <div class="grid-2">
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">📈 情感分布</span>
                        </div>
                        <div class="chart-container">
                            <canvas id="sentimentChart"></canvas>
                        </div>
                    </div>

                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-title">📰 热点文章</span>
                        </div>
                        <div id="newsList" style="max-height: 300px; overflow-y: auto;">
                            ${renderNews(data.analyzed_articles.slice(0, 5))}
                        </div>
                    </div>
                </div>
            `;

            // 初始化图表
            initCharts(data);
        }

        function renderAlerts(warnings) {
            if (!warnings || warnings.length === 0) {
                return '<div style="padding: 20px; text-align: center; color: #666;">暂无预警</div>';
            }

            const levelMap = {
                '严重': { class: 'alert-critical', label: '严重' },
                '高': { class: 'alert-high', label: '高' },
                '中': { class: 'alert-medium', label: '中' }
            };

            return warnings.slice(0, 5).map(w => {
                const level = levelMap[w.level] || { class: 'alert-medium', label: w.level };
                return `
                    <div class="alert-item ${level.class}">
                        <div class="alert-title">[${level.label}] ${w.level}级别预警</div>
                        <div>${w.message}</div>
                    </div>
                `;
            }).join('');
        }

        function renderNews(articles) {
            if (!articles || articles.length === 0) {
                return '<div style="padding: 20px; text-align: center; color: #666;">暂无数据</div>';
            }

            return articles.map(article => {
                const isRisky = article.has_risk;
                const sentimentBadge = getSentimentBadge(article.sentiment.sentiment_label);

                return `
                    <div class="news-item">
                        <div class="news-title">${article.article.title}</div>
                        <div class="news-meta">
                            📅 ${formatDate(article.article.published_at)} |
                            📰 ${article.article.source}
                        </div>
                        <div>
                            ${sentimentBadge}
                            ${isRisky ? `<span class="news-badge badge-risk">风险分: ${article.score.total_score}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getSentimentBadge(sentiment) {
            const map = {
                '正面': { class: 'badge-positive', text: '正面' },
                '负面': { class: 'badge-negative', text: '负面' },
                '中性': { class: 'badge-neutral', text: '中性' }
            };
            const badge = map[sentiment] || map['中性'];
            return `<span class="news-badge ${badge.class}">${badge.text}</span>`;
        }

        function initCharts(data) {
            // 情感分布饼图
            const sentimentCtx = document.getElementById('sentimentChart').getContext('2d');
            charts.sentiment = new Chart(sentimentCtx, {
                type: 'doughnut',
                data: {
                    labels: ['正面', '负面', '中性'],
                    datasets: [{
                        data: [
                            data.sentiment_distribution['正面'] || 0,
                            data.sentiment_distribution['负面'] || 0,
                            data.sentiment_distribution['中性'] || 0
                        ],
                        backgroundColor: ['#00c853', '#ef233c', '#8888a0'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '60%',
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // 风险类型柱状图
            if (data.risk_type_summary && Object.keys(data.risk_type_summary).length > 0) {
                const riskCtx = document.getElementById('riskChart').getContext('2d');
                charts.risk = new Chart(riskCtx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(data.risk_type_summary),
                        datasets: [{
                            label: '提及次数',
                            data: Object.values(data.risk_type_summary).map(r => r.count),
                            backgroundColor: 'rgba(102, 126, 234, 0.8)',
                            borderRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1
                                }
                            }
                        }
                    }
                });
            }
        }

        function getRiskClass(level) {
            switch(level) {
                case '低风险': return 'risk-low';
                case '中风险': return 'risk-medium';
                case '高风险': return 'risk-high';
                case '严重风险': return 'risk-high';
                default: return '';
            }
        }

        function calculateNegativeRatio(distribution) {
            const total = (distribution['正面'] || 0) + (distribution['负面'] || 0) + (distribution['中性'] || 0);
            if (total === 0) return 0;
            return Math.round(((distribution['负面'] || 0) / total) * 100);
        }

        function formatDate(dateString) {
            if (!dateString) return '未知日期';
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN');
        }

        function showError(message) {
            document.getElementById('dashboard').innerHTML = `
                <div class="panel">
                    <div class="error">
                        <h3>❌ 出错了</h3>
                        <p>${message}</p>
                        <button class="refresh-btn" onclick="refreshData()" style="margin-top: 20px;">
                            重试
                        </button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
